services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: distilink-app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      HOSTNAME: 0.0.0.0
      PORT: 3000
    volumes:
      - app-data:/app/data
    networks:
      - distilink-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3000/api/posts"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  nginx:
    image: nginx:alpine
    container_name: distilink-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/generated/nginx:/etc/nginx/conf.d:ro
      - nginx-logs:/var/log/nginx
      - certbot-www:/var/www/certbot
      - certbot-cert:/etc/letsencrypt
    depends_on:
      app:
        condition: service_healthy
    networks:
      - distilink-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  certbot:
    image: certbot/certbot:latest
    volumes:
      - certbot-www:/var/www/certbot
      - certbot-cert:/etc/letsencrypt
    networks:
      - distilink-network

networks:
  distilink-network:

volumes:
  app-data:
  nginx-logs:
  certbot-www:
  certbot-cert:
